name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install numpy pandas pyarrow scipy scikit-learn pytest ruff
          pip install -e .
      - name: Ruff lint
        run: |
          source .venv/bin/activate
          ruff check src tests
      - name: Pytest smoke
        run: |
          source .venv/bin/activate
          pytest -q tests/test_preprocess.py
